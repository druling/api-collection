info:
  name: mcp tool
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/workflow/mcp"
  headers:
    - name: X-PROFILE-ID
      value: test
    - name: X-SECRET-ID
      value: test
    - name: X-ENTITY-ID
      value: test
    - name: X-ENTITY-TYPE
      value: test
    - name: Accept
      value: text/event-stream

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
