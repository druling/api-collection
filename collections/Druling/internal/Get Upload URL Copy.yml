info:
  name: Get Upload URL Copy
  type: http
  seq: 1

http:
  method: POST
  url: "{{internal_backend_url}}/file/upload_url/"
  headers:
    - name: X-INTERNAL-AUTH
      value: "{{internal_token}}"
  body:
    type: json
    data: |-
      {
          "name": "test.pdf",
          "size": 10,
          "type": "pdf"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
